<!DOCTYPE html>
<html>
<head>
<title> PUNTO SALUD - Doctores </title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
header { font-family:sans-serif; background-color:#C3E3FD; padding: 30px; text-align: center; font-size: 35px; color: #2196F3; }
section { display: flex; align-items: stretch; min-height: max-content; }
nav { float: left; width: 20%; background: #9ACEF8; padding: 20px; }
article { font-family:sans-serif; float: left; width: 80%; background-color: #E8F5FF; text-align: center; display: flex; flex-direction: column; align-items: center; padding: 20px;}
.form-container { max-width: 500px; width: 100%; background: white; padding: 35px; border-radius: 12px; margin-bottom: 30px;}
.form-group { margin-bottom: 22px; text-align: left; }
label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
input[type="text"] { width: 100%; padding: 12px; border: 1px solid #C3E3FD; border-radius: 6px; color: #333; }
.btn-submit { background-color: #6EB8F5; color: white; border: none; padding: 14px 15px; width: 100%; border-radius: 6px; font-size: 16px; margin-top: 10px; cursor: pointer; }
.btn-submit:hover { background-color: #2874a6; }
.btn-edit { background-color: #f39c12; color: white; border: none; padding: 14px 15px; width: 100%; border-radius: 6px; font-size: 16px; margin-top: 10px; display: none; cursor: pointer; }
footer { font-family:sans-serif; background-color: #6EB8F5; padding: 10px; text-align: center; color: white; width: 100%; }
.lista-container { width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #2196F3; text-align: left; width: 340px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.btn-card-edit { background-color: #f1c40f; color: black; border: none; padding: 5px 10px; margin-right: 5px; border-radius: 4px; cursor: pointer; }
.btn-card-del { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <img src="logo.jpg" alt="Logo">
  <h1> Punto Salud </h1>
</header>
<section>
  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="Pacientes_.html">Pacientes</a></li>
      <li><a href="Citas_.html">Citas</a></li>
      <li><a href="Historial_.html">Historial</a></li>
    </ul>
  </nav>
  <article>
    <h2> Doctores </h2>
    <div class="form-container">
        <form onsubmit="event.preventDefault();">
          <input type="hidden" id="id_doctor_mongo">
          <div class="form-group"><label>Apellidos:</label><input type="text" id="apellidos" required></div>
          <div class="form-group"><label>Nombre:</label><input type="text" id="nombre" required></div>
          <div class="form-group"><label>Cedula Profesional:</label><input type="text" id="cedula_profesional" required></div>
          <div class="form-group"><label>Especialidad:</label><input type="text" id="especialidad" required></div>
          <div class="form-group"><label>Disponibilidad:</label><input type="text" id="disponibilidad" placeholder="Ej. [Lun-Dom / 12:00-18:00]" required></div>
          <div class="form-group"><label>Telefono:</label><input type="text" id="telefono" required></div>
          <div class="form-group"><label>Correo:</label><input type="text" id="correo" required></div>
          <div class="form-group"><label>Domicilio:</label><input type="text" id="domicilio" required></div>
          <button type="button" id="btn-guardar" onclick="agregarDoctores()" class="btn-submit">Dar de alta el Doctor</button>
          <button type="button" id="btn-actualizar" onclick="actualizarDoctor()" class="btn-edit">Confirmar Cambios</button>
        </form>
    </div>
    <h3>Listado de Médicos</h3>
    <div id="listaDoctores" class="lista-container"></div>
  </article>
</section>
<script>
document.addEventListener("DOMContentLoaded", cargarDoctores);

function obtenerDatos() {
    return {
        apellidos: document.getElementById("apellidos").value,
        nombre: document.getElementById("nombre").value,
        cedula_profesional: document.getElementById("cedula_profesional").value,
        especialidad: document.getElementById("especialidad").value,
        disponibilidad: document.getElementById("disponibilidad").value,
        telefono: document.getElementById("telefono").value,
        correo: document.getElementById("correo").value,
        domicilio: document.getElementById("domicilio").value
    };
}

function limpiar() {
    document.getElementById("apellidos").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("cedula_profesional").value = "";
    document.getElementById("especialidad").value = "";
    document.getElementById("disponibilidad").value = "";
    document.getElementById("telefono").value = "";
    document.getElementById("correo").value = "";
    document.getElementById("domicilio").value = "";
    document.getElementById("id_doctor_mongo").value = "";
    document.getElementById("btn-guardar").style.display = "block";
    document.getElementById("btn-actualizar").style.display = "none";
}

async function cargarDoctores() {
    try {
        const res = await fetch('/api/doctores');
        const docs = await res.json();
        const contenedor = document.getElementById("listaDoctores");
        contenedor.innerHTML = "";
        docs.forEach(d => {
            let card = document.createElement("div");
            card.classList.add("card");
            card.innerHTML = `
                <h3>Dr(a). ${d.nombre} ${d.apellidos}</h3>
                <p><strong>Especialidad:</strong> ${d.especialidad}</p>
                <p><strong>Cédula:</strong> ${d.cedula_profesional}</p>
                <p><strong>Horario:</strong> ${d.disponibilidad}</p>
                <p><strong>Teléfono:</strong> ${d.telefono}</p>
                <button class="btn-card-edit" onclick="prepararEditar('${d._id}','${d.apellidos}','${d.nombre}','${d.cedula_profesional}','${d.especialidad}','${d.disponibilidad}','${d.telefono}','${d.correo}','${d.domicilio}')">Editar</button>
                <button class="btn-card-del" onclick="eliminarDoctor('${d._id}')">Eliminar</button>
            `;
            contenedor.appendChild(card);
        });
    } catch (err) { console.error(err); }
}

async function agregarDoctores() {
    const datos = obtenerDatos();
    if(Object.values(datos).some(x => x === "")) return alert("Llena todos los campos");
    try {
        const res = await fetch('/api/doctores', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        if(res.ok) { alert("Doctor guardado"); limpiar(); cargarDoctores(); }
    } catch(e) { alert("Error"); }
}

function prepararEditar(mongoId, ape, nom, ced, esp, disp, tel, corr, dom) {
    document.getElementById("id_doctor_mongo").value = mongoId;
    document.getElementById("apellidos").value = ape;
    document.getElementById("nombre").value = nom;
    document.getElementById("cedula_profesional").value = ced;
    document.getElementById("especialidad").value = esp;
    document.getElementById("disponibilidad").value = disp;
    document.getElementById("telefono").value = tel;
    document.getElementById("correo").value = corr;
    document.getElementById("domicilio").value = dom;
    document.getElementById("btn-guardar").style.display = "none";
    document.getElementById("btn-actualizar").style.display = "block";
}

async function actualizarDoctor() {
    const id = document.getElementById("id_doctor_mongo").value;
    const datos = obtenerDatos();
    try {
        const res = await fetch(`/api/doctores/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        if(res.ok) { alert("Doctor actualizado"); limpiar(); cargarDoctores(); }
    } catch(e) { alert("Error"); }
}

async function eliminarDoctor(id) {
    if(!confirm("¿Eliminar este doctor?")) return;
    try {
        const res = await fetch(`/api/doctores/${id}`, { method: 'DELETE' });
        if(res.ok) { alert("Doctor eliminado"); cargarDoctores(); }
    } catch(e) { alert("Error"); }
}
</script>

</body>
</html>
</html>
