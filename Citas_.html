<!DOCTYPE html>
<html>
<head>
<title> PUNTO SALUD - Citas </title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
header { font-family:sans-serif; background-color:#C3E3FD; padding: 30px; text-align: center; font-size: 35px; color: #2196F3; }
section { display: flex; align-items: stretch; min-height: max-content; }
nav { float: left; width: 20%; background: #9ACEF8; padding: 20px; }
article { font-family:sans-serif; float: left; width: 80%; background-color: #E8F5FF; text-align: center; display: flex; flex-direction: column; align-items: center; padding: 20px;}
.form-container { max-width: 500px; width: 100%; background: white; padding: 35px; border-radius: 12px; margin-bottom: 30px; }
.form-group { margin-bottom: 22px; text-align: left; }
label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
input[type="text"], input[type="time"], input[type="date"], select { width: 100%; padding: 12px; border: 1px solid #C3E3FD; border-radius: 6px; color: #333; background: white; }
.btn-submit { background-color: #6EB8F5; color: white; border: none; padding: 14px 15px; width: 100%; border-radius: 6px; font-size: 16px; margin-top: 10px; cursor: pointer; }
.btn-submit:hover { background-color: #2874a6; }
.btn-edit { background-color: #f39c12; color: white; border: none; padding: 14px 15px; width: 100%; border-radius: 6px; font-size: 16px; margin-top: 10px; display: none; cursor: pointer; }
footer { font-family:sans-serif; background-color: #6EB8F5; padding: 10px; text-align: center; color: white; width: 100%; }
.lista-container { width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #2196F3; text-align: left; width: 340px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.btn-card-edit { background-color: #f1c40f; color: black; border: none; padding: 5px 10px; margin-right: 5px; border-radius: 4px; cursor: pointer; }
.btn-card-del { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <img src="logo.jpg" alt="Logo">
  <h1> Punto Salud </h1>
</header>
<section>
  <nav>
    <ul>
      <li><a href="Doctores_.html">Doctores</a></li>
      <li><a href="Pacientes_.html">Pacientes</a></li>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="Historial_.html">Historial</a></li>
    </ul>
  </nav>
  <article>
    <h2> Citas </h2>
    <div class="form-container">
        <form onsubmit="event.preventDefault();">
          <input type="hidden" id="id_cita_mongo">
          <div class="form-group"><label>Fecha:</label><input type="date" id="fecha" required></div>
          <div class="form-group"><label>Hora:</label><input type="time" id="hora" required></div>
          <div class="form-group"><label>Motivo:</label><input type="text" id="motivo" required></div>
          <div class="form-group">
            <label>Medico:</label>
            <select id="medico" required>
                <option value="Villamizar">Villamizar</option>
                <option value="Santamaria">Santamaria</option>
                <option value="Alvarez">Alvarez</option>
                <option value="Arboleda">Arboleda</option>
                <option value="Casal">Casal</option>
            </select>
          </div>
          <div class="form-group"><label>ID Paciente</label><input type="text" id="id" required></div>
          <div class="form-group">
            <label>Estado de la Cita</label>
              <select id="estado" required>
                <option value="Confirmada">Confirmada</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Cancelada">Cancelada</option>
              </select>
          </div>
          <button type="button" id="btn-guardar" onclick="agregarCitas()" class="btn-submit">Dar de alta la Cita</button>
          <button type="button" id="btn-actualizar" onclick="actualizarCita()" class="btn-edit">Confirmar Cambios</button>
        </form>
    </div>
    <h3>Listado de Citas</h3>
    <div id="listaCitas" class="lista-container"></div>
  </article>
</section>
<script>  
document.addEventListener("DOMContentLoaded", cargarCitas);

function obtenerDatos() {
    return {
        fecha: document.getElementById("fecha").value,
        hora: document.getElementById("hora").value,
        motivo: document.getElementById("motivo").value,
        medico: document.getElementById("medico").value,
        id: document.getElementById("id").value,
        estado: document.getElementById("estado").value
    };
}

function limpiar() {
    document.getElementById("fecha").value = "";
    document.getElementById("hora").value = "";
    document.getElementById("motivo").value = "";
    document.getElementById("id").value = "";
    document.getElementById("id_cita_mongo").value = "";
    document.getElementById("btn-guardar").style.display = "block";
    document.getElementById("btn-actualizar").style.display = "none";
}

async function cargarCitas() {
    try {
        const res = await fetch('/api/citas');
        const citas = await res.json();
        const contenedor = document.getElementById("listaCitas");
        contenedor.innerHTML = "";
        citas.forEach(c => {
            let fechaStr = c.fecha ? c.fecha.split('T')[0] : '';
            let card = document.createElement("div");
            card.classList.add("card");
            card.innerHTML = `
                <h3>Médico: ${c.medico}</h3>
                <p><strong>Fecha:</strong> ${fechaStr} <strong>Hora:</strong> ${c.hora}</p>
                <p><strong>Motivo:</strong> ${c.motivo}</p>
                <p><strong>Paciente ID:</strong> ${c.id}</p>
                <p><strong>Estado:</strong> ${c.estado}</p>
                <button class="btn-card-edit" onclick="prepararEditar('${c._id}','${fechaStr}','${c.hora}','${c.motivo}','${c.medico}','${c.id}','${c.estado}')">Editar</button>
                <button class="btn-card-del" onclick="eliminarCita('${c._id}')">Eliminar</button>
            `;
            contenedor.appendChild(card);
        });
    } catch (err) { console.error(err); }
}

async function agregarCitas() {
    const datos = obtenerDatos();
    if(Object.values(datos).some(x => x === "")) return alert("Llena todos los campos");
    try {
        const res = await fetch('/api/citas', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        if(res.ok) { alert("Cita registrada"); limpiar(); cargarCitas(); }
    } catch(e) { alert("Error"); }
}

function prepararEditar(mongoId, fec, hor, mot, med, idPac, est) {
    document.getElementById("id_cita_mongo").value = mongoId;
    document.getElementById("fecha").value = fec;
    document.getElementById("hora").value = hor;
    document.getElementById("motivo").value = mot;
    document.getElementById("medico").value = med;
    document.getElementById("id").value = idPac;
    document.getElementById("estado").value = est;
    document.getElementById("btn-guardar").style.display = "none";
    document.getElementById("btn-actualizar").style.display = "block";
}

async function actualizarCita() {
    const id = document.getElementById("id_cita_mongo").value;
    const datos = obtenerDatos();
    try {
        const res = await fetch(`/api/citas/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        if(res.ok) { alert("Cita actualizada"); limpiar(); cargarCitas(); }
    } catch(e) { alert("Error"); }
}

async function eliminarCita(id) {
    if(!confirm("¿Eliminar esta cita?")) return;
    try {
        const res = await fetch(`/api/citas/${id}`, { method: 'DELETE' });
        if(res.ok) { alert("Cita eliminada"); cargarCitas(); }
    } catch(e) { alert("Error"); }
}
</script>
<footer><p>Mata Valdez Itzel Regina - 4ºI - Programacion - Implementa Bases De Datos No Relacionales En Un Sistema - 24308051280593</p> <img src="logo.jpg" alt="Logo"> </footer>
</body>
</html>
