<!DOCTYPE html>
<html>
<head>
<title> PUNTO SALUD - Pacientes </title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
header { font-family:sans-serif; background-color:#C3E3FD; padding: 30px; text-align: center; font-size: 35px; color: #2196F3; }
section { display: flex; align-items: stretch; min-height: max-content; }
nav { float: left; width: 20%; background: #9ACEF8; padding: 20px; }
article { font-family:sans-serif; float: left; width: 80%; background-color: #E8F5FF; text-align: center; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.form-container { max-width: 500px; width: 100%; background: white; padding: 35px; border-radius: 12px; margin-bottom: 30px; }
.form-group { margin-bottom: 22px; text-align: left; }
label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 12px; border: 1px solid #C3E3FD; border-radius: 6px; color: #333; }
.btn-submit { background-color: #6EB8F5; color: white; border: none; padding: 14px 15px; width: 100%; border-radius: 6px; font-size: 16px; margin-top: 10px; cursor: pointer; }
.btn-submit:hover { background-color: #2874a6; }
.btn-edit { background-color: #f39c12; color: white; border: none; padding: 14px 15px; width: 100%; border-radius: 6px; font-size: 16px; margin-top: 10px; display: none; cursor: pointer; }
footer { font-family:sans-serif; background-color: #6EB8F5; padding: 10px; text-align: center; color: white; width: 100%; }
.lista-container { width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #2196F3; text-align: left; width: 340px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.btn-card-edit { background-color: #f1c40f; color: black; border: none; padding: 5px 10px; margin-right: 5px; border-radius: 4px; cursor: pointer; }
.btn-card-del { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <img src="logo.jpg" alt="Logo">
  <h1> Punto Salud </h1>
</header>
<section>
  <nav>
    <ul>
      <li><a href="Doctores_.html">Doctores</a></li>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="Citas_.html">Citas</a></li>
      <li><a href="Historial_.html">Historial</a></li>
    </ul>
  </nav>
  <article>
    <h2> Pacientes </h2>
    <div class="form-container">
        <form onsubmit="event.preventDefault();">
            <input type="hidden" id="id_paciente_mongo">
            <div class="form-group"><label>Nombre Completo:</label><input type="text" id="nombre_completo" required></div>
            <div class="form-group"><label>Fecha de Nacimiento:</label><input type="date" id="fecha_nacimiento" required></div>
            <div class="form-group"><label>Genero:</label><input type="text" id="genero" placeholder="Masculino o Femenino" required></div>
            <div class="form-group"><label>Telefono:</label><input type="number" id="telefono" required></div>
            <div class="form-group"><label>Correo:</label><input type="text" id="correo" required></div>
            <div class="form-group"><label>Contacto de Emergencia:</label><input type="number" id="contacto_emergencia" required></div>
            <div class="form-group"><label>Parentesco:</label><input type="text" id="parentesco" required></div>
            <div class="form-group"><label>Seguro:</label><input type="text" id="seguro" required></div>  
            <div class="form-group"><label>RFC:</label><input type="text" id="rfc" required></div>
            <button type="button" id="btn-guardar" onclick="agregarPacientes()" class="btn-submit">Dar de alta al Paciente</button>
            <button type="button" id="btn-actualizar" onclick="actualizarPaciente()" class="btn-edit">Confirmar Cambios</button>
        </form>
    </div>
    <h3>Listado de Pacientes</h3>
    <div id="listaPacientes" class="lista-container"></div>
  </article>
</section>
<script>
document.addEventListener("DOMContentLoaded", cargarPacientes);

function obtenerDatos() {
    return {
        nombre_completo: document.getElementById("nombre_completo").value,
        fecha_nacimiento: document.getElementById("fecha_nacimiento").value,
        genero: document.getElementById("genero").value,
        telefono: document.getElementById("telefono").value,
        correo: document.getElementById("correo").value,
        contacto_emergencia: document.getElementById("contacto_emergencia").value,
        parentesco: document.getElementById("parentesco").value,
        seguro: document.getElementById("seguro").value,
        rfc: document.getElementById("rfc").value
    };
}

function limpiar() {
    document.getElementById("nombre_completo").value = "";
    document.getElementById("fecha_nacimiento").value = "";
    document.getElementById("genero").value = "";
    document.getElementById("telefono").value = "";
    document.getElementById("correo").value = "";
    document.getElementById("contacto_emergencia").value = "";
    document.getElementById("parentesco").value = "";
    document.getElementById("seguro").value = "";
    document.getElementById("rfc").value = "";
    document.getElementById("id_paciente_mongo").value = "";
    document.getElementById("btn-guardar").style.display = "block";
    document.getElementById("btn-actualizar").style.display = "none";
}

async function cargarPacientes() {
    try {
        const res = await fetch('/api/pacientes');
        const pacientes = await res.json();
        const contenedor = document.getElementById("listaPacientes");
        contenedor.innerHTML = "";
        pacientes.forEach(p => {
            let fechaStr = p.fecha_nacimiento ? p.fecha_nacimiento.split('T')[0] : '';
            let card = document.createElement("div");
            card.classList.add("card");
            card.innerHTML = `
                <h3>${p.nombre_completo}</h3>
                <p><strong>Nacimiento:</strong> ${fechaStr}</p>
                <p><strong>Género:</strong> ${p.genero}</p>
                <p><strong>Teléfono:</strong> ${p.telefono}</p>
                <p><strong>Correo:</strong> ${p.correo}</p>
                <p><strong>RFC:</strong> ${p.rfc}</p>
                <button class="btn-card-edit" onclick="prepararEditar('${p._id}','${p.nombre_completo}','${fechaStr}','${p.genero}','${p.telefono}','${p.correo}','${p.contacto_emergencia}','${p.parentesco}','${p.seguro}','${p.rfc}')">Editar</button>
                <button class="btn-card-del" onclick="eliminarPaciente('${p._id}')">Eliminar</button>
            `;
            contenedor.appendChild(card);
        });
    } catch (err) { console.error(err); }
}

async function agregarPacientes() {
    const datos = obtenerDatos();
    if(Object.values(datos).some(x => x === "")) return alert("Llena todos los campos");
    try {
        const res = await fetch('/api/pacientes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        if(res.ok) { alert("Paciente registrado"); limpiar(); cargarPacientes(); }
    } catch(e) { alert("Error"); }
}

function prepararEditar(id, nom, fec, gen, tel, corr, cont, par, seg, rfc) {
    document.getElementById("id_paciente_mongo").value = id;
    document.getElementById("nombre_completo").value = nom;
    document.getElementById("fecha_nacimiento").value = fec;
    document.getElementById("genero").value = gen;
    document.getElementById("telefono").value = tel;
    document.getElementById("correo").value = corr;
    document.getElementById("contacto_emergencia").value = cont;
    document.getElementById("parentesco").value = par;
    document.getElementById("seguro").value = seg;
    document.getElementById("rfc").value = rfc;
    document.getElementById("btn-guardar").style.display = "none";
    document.getElementById("btn-actualizar").style.display = "block";
}

async function actualizarPaciente() {
    const id = document.getElementById("id_paciente_mongo").value;
    const datos = obtenerDatos();
    try {
        const res = await fetch(`/api/pacientes/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
        if(res.ok) { alert("Datos actualizados"); limpiar(); cargarPacientes(); }
    } catch(e) { alert("Error"); }
}

async function eliminarPaciente(id) {
    if(!confirm("¿Eliminar este paciente?")) return;
    try {
        const res = await fetch(`/api/pacientes/${id}`, { method: 'DELETE' });
        if(res.ok) { alert("Paciente eliminado"); cargarPacientes(); }
    } catch(e) { alert("Error"); }
}
</script>

</body>
</html>
